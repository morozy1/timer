<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>den</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1f1f2e, #0f0f17 70%);
    font-family: 'Inter', sans-serif;
    color: white;
}

/* Карточка */
.card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 24px;
    box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 320px;
}

.card h2 {
    font-weight: 600;
    text-align: center;
    letter-spacing: 1px;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

label {
    font-size: 14px;
    opacity: 0.7;
}

input {
    padding: 12px;
    font-size: 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
}

input::-webkit-calendar-picker-indicator {
    filter: invert(1);
}

button {
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
}

.start-btn {
    background: linear-gradient(135deg, #6a5cff, #8f7bff);
    color: white;
}

.start-btn:hover {
    transform: scale(1.05);
}

.reset-btn {
    margin-top: 30px;
    background: rgba(255,255,255,0.1);
    color: white;
    display: none;
}

.reset-btn:hover {
    background: rgba(255,255,255,0.2);
}

#countdown {
    display: none;
    font-size: 7vw;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-align: center;
}
</style>
</head>
<body>

<div class="card" id="setup">
    <h2>Установить дату</h2>

    <div class="input-group">
        <label>Дата</label>
        <input type="date" id="dateInput">
    </div>

    <div class="input-group">
        <label>Время (необязательно)</label>
        <input type="time" id="timeInput" step="1">
    </div>

    <button class="start-btn" onclick="startTimer()">Запустить таймер</button>
</div>

<div id="countdown">00:00:00:00</div>
<button class="reset-btn" id="resetBtn" onclick="resetTimer()">Сбросить</button>

<script>
let targetDate;
let interval;

function startTimer() {
    const date = document.getElementById("dateInput").value;
    let time = document.getElementById("timeInput").value;

    if (!date) {
        alert("Выберите дату");
        return;
    }

    // если время не указано — автоматически 00:00:00
    if (!time) {
        time = "00:00:00";
    }

    targetDate = new Date(date + "T" + time);

    if (targetDate <= new Date()) {
        alert("Дата должна быть в будущем");
        return;
    }

    document.getElementById("setup").style.display = "none";
    document.getElementById("countdown").style.display = "block";
    document.getElementById("resetBtn").style.display = "block";

    updateCountdown();
    interval = setInterval(updateCountdown, 1000);
}

function updateCountdown() {
    const now = new Date();
    const diff = targetDate - now;

    if (diff <= 0) {
        clearInterval(interval);
        document.getElementById("countdown").textContent = "00:00:00:00";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").textContent =
        String(days).padStart(2, '0') + ":" +
        String(hours).padStart(2, '0') + ":" +
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0');
}

function resetTimer() {
    clearInterval(interval);
    document.getElementById("countdown").style.display = "none";
    document.getElementById("resetBtn").style.display = "none";
    document.getElementById("setup").style.display = "flex";
}
</script>

</body>
</html>
